<!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">

<title>CRS Studio Web</title>

<link rel="stylesheet" href="css/style.css">

<link
rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"
/>

</head>

<body>

<h1>CRS Studio Web</h1>

<div class="layout">

<div class="panel">

<h2>Buscar CRS por EPSG</h2>

<input id="epsgCode" placeholder="Ex: 4326, 4674, 31983">

<button id="searchEPSG">
Buscar
</button>

<hr>

<h2>Gerar CRS UTM</h2>

<label>Datum</label>

<select id="datum">

<option value="WGS84">WGS84</option>

<option value="SIRGAS2000">SIRGAS2000</option>

</select>

<label>Zona UTM</label>

<input id="zone" type="number" value="23">

<label>Hemisfério</label>

<select id="hemisphere">

<option value="south">Sul</option>

<option value="north">Norte</option>

</select>

<button id="generateCRS">
Gerar WKT
</button>

<hr>

<p><b>Dica:</b> clique no mapa para detectar automaticamente a zona UTM.</p>

</div>

<div class="panel">

<h2>WKT</h2>

<textarea id="wktOutput"></textarea>

<br>

<button id="copyWKT">
Copiar WKT
</button>

</div>

<div class="panel">

<h2>Mapa</h2>

<div id="map"></div>

</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="js/app.js"></script>

</body>

</html>
