<!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">

<title>CRS Studio</title>

<link rel="stylesheet" href="css/style.css">

<link
rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"
/>

</head>

<body>

<h1>CRS Studio Web</h1>

<div class="layout">

<div class="panel">

<h2>Buscar EPSG</h2>

<input id="epsgCode" placeholder="Ex: 31983">

<button id="searchEPSG">
Buscar
</button>

<h2>CRS Builder</h2>

<label>Datum</label>

<select id="datum">
<option value="SIRGAS2000">SIRGAS2000</option>
<option value="WGS84">WGS84</option>
</select>

<label>Zona UTM</label>

<input id="zone" type="number" value="23">

<button id="generateCRS">
Gerar WKT
</button>

</div>

<div class="panel">

<h2>WKT</h2>

<textarea id="wktOutput"></textarea>

</div>

<div class="panel">

<h2>Mapa</h2>

<div id="map"></div>

</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>

<script src="js/app.js"></script>
<script src="js/epsg.js"></script>
<script src="js/wktGenerator.js"></script>
<script src="js/map.js"></script>

</body>

</html>
